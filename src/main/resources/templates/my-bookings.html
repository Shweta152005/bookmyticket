<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f1a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background-color: #1a1a2e;
            border-bottom: 2px solid #e63946;
        }

        .navbar-brand {
            color: #e63946 !important;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: #e63946;
            margin-bottom: 2rem;
        }

        .ticket-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid #e6394640;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .ticket-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px #e6394630;
        }

        .ticket-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 5px; height: 100%;
            background: #e63946;
            border-radius: 16px 0 0 16px;
        }

        .movie-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }

        .badge-seat {
            background: #e6394620;
            border: 1px solid #e63946;
            color: #e63946;
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 0.85rem;
            margin: 2px;
            display: inline-block;
        }

        .info-label {
            color: #aaa;
            font-size: 0.85rem;
        }

        .info-value {
            color: #fff;
            font-weight: 600;
        }

        .qr-img {
            width: 90px;
            height: 90px;
            border-radius: 8px;
            border: 2px solid #e63946;
        }

        .divider {
            border-top: 1px dashed #e6394640;
            margin: 1rem 0;
        }

        .total-price {
            color: #e63946;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: 5rem 1rem;
        }

        .empty-state i {
            font-size: 5rem;
            color: #e6394640;
            margin-bottom: 1.5rem;
        }

        .empty-state h3 {
            color: #aaa;
        }

        .btn-home {
            background: #e63946;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 28px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
            transition: background 0.2s;
        }

        .btn-home:hover {
            background: #c1121f;
            color: #fff;
        }

        .alert-flash {
            border-radius: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/main">🎬 BookMyTicket</a>
        <div class="ms-auto">
            <a href="/main" class="btn btn-outline-danger btn-sm me-2">Home</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container py-5">

    <!-- Flash messages -->
    <div th:if="${pass}" class="alert alert-success alert-flash" th:text="${pass}"></div>
    <div th:if="${fail}" class="alert alert-danger alert-flash" th:text="${fail}"></div>

    <div class="page-title">
        <i class="fas fa-ticket-alt me-2"></i> My Bookings
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(tickets)}" class="empty-state">
        <i class="fas fa-film"></i>
        <h3>No bookings yet!</h3>
        <p class="text-muted">Looks like you haven't booked any tickets yet.</p>
        <a href="/main" class="btn-home">Browse Movies</a>
    </div>

    <!-- Ticket cards -->
    <div th:each="ticket : ${tickets}" class="ticket-card">
        <div class="row align-items-center">

            <!-- Left: Movie info -->
            <div class="col-md-8">
                <div class="movie-name mb-2" th:text="${ticket.movieName}">Movie Name</div>

                <div class="row g-2 mb-2">
                    <div class="col-6 col-md-4">
                        <div class="info-label"><i class="fas fa-building me-1"></i>Theater</div>
                        <div class="info-value" th:text="${ticket.theaterName}">Theater</div>
                    </div>
                    <div class="col-6 col-md-4">
                        <div class="info-label"><i class="fas fa-desktop me-1"></i>Screen</div>
                        <div class="info-value" th:text="${ticket.screenName}">Screen</div>
                    </div>
                    <div class="col-6 col-md-4">
                        <div class="info-label"><i class="fas fa-calendar me-1"></i>Date</div>
                        <div class="info-value" th:text="${ticket.showDate}">Date</div>
                    </div>
                    <div class="col-6 col-md-4">
                        <div class="info-label"><i class="fas fa-clock me-1"></i>Time</div>
                        <div class="info-value" th:text="${ticket.showTiming}">Time</div>
                    </div>
                    <div class="col-6 col-md-4">
                        <div class="info-label"><i class="fas fa-chair me-1"></i>Seats</div>
                        <div>
                            <span th:each="seat : ${ticket.seatNumber}" class="badge-seat" th:text="${seat}">A1</span>
                        </div>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="d-flex align-items-center gap-4">
                    <div>
                        <span class="info-label">Tickets: </span>
                        <span class="info-value" th:text="${ticket.ticketCount}">1</span>
                    </div>
                    <div>
                        <span class="info-label">Price/seat: </span>
                        <span class="info-value" th:text="'₹' + ${ticket.ticketPrice}">₹200</span>
                    </div>
                    <div class="total-price"
                         th:text="'Total: ₹' + ${ticket.ticketPrice * ticket.ticketCount}">Total: ₹400
                    </div>
                </div>

                <div class="mt-2">
                    <span class="info-label">Order ID: </span>
                    <span class="info-value" style="font-size:0.85rem; color:#aaa;" th:text="${ticket.orderId}"></span>
                </div>
            </div>

            <!-- Right: QR code -->
            <div class="col-md-4 text-center mt-3 mt-md-0">
                <div th:if="${ticket.qrUrl != null}">
                    <img th:src="${ticket.qrUrl}" class="qr-img" alt="QR Code">
                    <div class="info-label mt-2">Scan at entry</div>
                </div>
                <div th:if="${ticket.qrUrl == null}">
                    <i class="fas fa-qrcode" style="font-size:4rem; color:#e6394640;"></i>
                    <div class="info-label mt-1">QR unavailable</div>
                </div>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
